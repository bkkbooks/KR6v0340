body:
  text: 法稱著王森譯正理滴論是一部研究因明學的古典著作作者法稱為古印度哲學家他繼承並發展陳那的因明和認識論的學說著有因明七論正理滴論即是其中的一部全論分為三品簡明扼要地論述了因明的推理法則一直為各國的學術界所重視並有不少專著論述其在邏輯學領域的地位和價值論中對現量和比量的思維活動層次所作的精闢分析對心理學的研究也有一定價值現量品第一衆人所務凡得成遂必以正智為其先導是故彼智此論今詳正智有二一者現量二者比量此中現量謂離分別復無錯亂辨察智中所現影像其像適於安立名言即此辨察名為分別若能遠離如是分別復無翳目急遽旋轉乘舟以及諸界不調所生錯亂如是之智名為現量此有四種一者五根智二者意根智謂五根緣境自有根智無間而生即以此智境為助伴作等無間緣有意識生此初生意名為意根現量三者自證謂諸心心所各自證分四者定心謂修定者修真實義至究竟位所起瑜祇智現量之境名為自相言自相者謂若由其境之遠近識中影像現差異者此所緣境名為自相唯此自相為勝義有唯以力能為境起識是實有事之性相故若異此者皆名共相彼則說為比量之境復次即彼現智即為量果證境親明為性相故帶境而起是名為量由帶境故乃能成其證境親明現量品第一終為自比量品第二比量有二一者為自二者為他此中為自比量者謂於所比藉三相因所起正智亦於此智立量果名如現量說復次因三相者謂於所比因唯有性唯於同品有性於異品中決定唯無此中所比謂即有法於此具有所欲比之差別義言同品者謂所立法均等義品若非同品說名異品謂此與彼相異相違或於此中無彼同義復次三相正因唯有三種謂不可得比量因自性比量因及果比量因此中不可得比量因者如指某處而立量云此處無瓶瓶可得相雖已具足而瓶不可得故言可得相已具足者謂余種種可得因緣悉已圓具應可得物自體亦有若物自體既為實有其余種種可得因緣亦實有者其物自體定可現見言自性比量因者因之自體若為實有即於所立法能為正因譬如說言此物是樹以彼本是興遐巴故無憂樹舊譯申恕波果比量因者謂如說言彼處有火以見烟故此中後二能成實事前一僅為遮止之因由彼自性二恆相屬故舉一義餘義定隨設若此二非恆相屬即二者間不相離義不決定故此亦即因與所立義恆相屬義尅實而論即所立義之自體故從所立義而生起故若此既非彼之自體復非從彼而生起者此中即以非恆相屬為自性故若彼自體若從彼生如是二種或即自性比量因體或即為果比量因體唯由此二為能如實成立實事其遮止義能成立者唯是由於如前所說不可得義事若實有彼不可得必不容有故若異此者其可得相尚不具足處時自性境本玄祕自身現量原不能見其境非有不決定故若觀察者於過去時或現在時現量曾得其念不失由此心行物不現前說為非有方能成立唯由此義說物非有始決定故此不可得由其運用方式各有不同成十一種一者自體不可得譬如說言此處無烟烟可得相雖已具足而不可得故二者果不可得如有說言此處無有烟之不障能作等因以無烟故三者能遍不可得如說此處無興遐巴以無樹故四者相違自性可得如說此處定無冷觸以有火故五者相違果法可得如說此處定無冷觸以有烟故六者相違所遍可得譬如說言縱令有生其物之滅亦非恆定待餘緣故七者果相違法可得譬如說言此處無有冷觸不障能作等因以有火故八者能遍相違法可得如說此處無有霜雪感觸以有火故九者因不可得譬如說言此處無烟以無火故十者因相違法可得如說此人無寒栗等近烈火故十一者因相違果法可得譬如說言此處無人起寒栗等以有烟故自第二式果不可得以下十式此等皆可攝入第一自體不可得中謂藉餘義或有或無復依各別運用方式次第列為諸式然由數習觀察此等運用方式習者自能於遮止義得明決智是故此等不可得式今於為自比量中說此不可得若由自體相違法等現前可得若由因等現不可得而能成立某物非有或能安立非有言說於此等中一切時處若有顯示遮止義者唯於其物可得因緣悉具足時始能知其或為可得或不可得於餘玄祕諸境義中彼此相違互為因果皆不成就故諸玄祕境不可得者現比二量所不能量為其相故是猶豫因彼即非是量所能量其事非有亦不成立故為自比量品第二終為他比量品第三宣說三相正因開示他人是名為他比量此於因位安立果名此有二種論式不同故一具同法二具異法除論式不同外二者之間都無少許實質差異此中具同法者若有一物其可得相雖已具足而不可得即可斷言此物非有亦即此物為非有言詞之境例如兔角等今於某處瓶可得相雖已具足而瓶不可得即可斷言某處無瓶自性因式亦復如是若物是有彼皆無常譬如瓶等是為純自性因式若物有生彼定無常是則由其自性本具義法而成之自性因式若是所作彼即無常是則由限定一義而成若法因待他法營為其法自體始得成就是名所作如是勤勇無間所發緣散則壞等亦應准知聲是實有或是有生或是所作說名宗法如是一切能成立法其為正因當知唯由此能立法若為實有即能與其所成立法相屬不離此義隨宜先由正量已各成立唯以此義為其自性故又此自性即因體故尅實而論彼即能所二立共自體故若彼成立而此不成應成非彼自性故亦復彼此可相離故復次果比量論式者如說若有烟處彼定有火如灶等處今於此處現見有烟若因果性實成就者亦可說因為所立法說果為其能立之因具異法喻其式如下若物現有其可得相復具足者是則彼物決定可得如彼青色此白色等然於此處瓶可得相雖已具足現有之瓶而不可得是為不可得比量因式若非無常則非實有非有生非所作性聲是實有或有生或所作性是名自性比量因式若無火處烟定不有而於此處現見有烟是名果比量因式復次若論式中具同法喻即於此式其異法喻義准自明若不爾者因與所立相隨逐義應非有故若具異喻准知有合亦復如是若不爾者所立無處因必非有不成就故設非自性相屬不離一法若無餘法不有不決定故此相屬義總為二類一者即彼自體相二者從彼而生相如前已說然則由說離言合義自顯是故說遠離言即已兼顯相屬著義若已顯示相屬著義即此即為顯彼因宗合義言說若爾雖或唯由相合屬門或復唯由相遠離門但說一義即足顯因於同品有於異品無故諸式中初不定需俱說二喻依不可得亦復如是若物實有其可得相已具足者彼物決定可得既說此語而實不可得如是物非實有決智既起合義成就復次此二式中隨用一式都不定須顯說其宗如是且初具同喻式譬如說言若有一物其可得相雖已具足而不可得是則彼物但有其名實無其體已說此處瓶可得相雖已具足而實瓶體了不可得由此其宗此處無瓶即已顯了義已明故具異喻式亦復如是言之所指物若實有其可得相又已具足彼物即應決定可得然於此處實有之瓶了不可得說此語已即足顯宗此處定無瓶名所指實有瓶體義已明故復次應說何者名宗謂唯由自相隨自意許無能違害是名為宗言由自相者謂以所成立性為所樂為言唯由自相者謂唯以所成立性為所樂為非以能成立性如以聲上有無常性為其所立舉因若云眼所見性故此因於聲不成因性故亦所立然於此處彼為所立非本樂為說彼以為能立性故言隨自者謂立論人彼於此時宣說能立是故若依某論而說能立其論作者於一有法許有多法彼時立者隨自意樂舉其一法而成立之即唯此法為其所立非是餘法應如是解言意許者若於一義由違諍故安布能立暗示其義欲其成立雖未藉言顯陳其義亦為所立彼乃立敵正所諍故如說眼等必為他用積聚性故如諸床座之支分等此論式中雖未明言為神我用而意實以為神我用為其所立是故非唯言之所陳名為所立意許之言當作此解言無能違害者意顯所立雖已具足種種宗相然其樂為所成立義乃為現量比量共信自語等之所違害由此其義非無過宗此中現量相違者如說聲非所聞比量相違者如說聲是常住共信相違者如說玉兔非月自語相違者如說比量非量是名四種相違似宗如是若已成就若尚未成而樂以為能成立性若非當時立者隨自意樂成立若唯言陳不問意許若相違義之所遮遣皆似所立由翻此等名正所立謂唯由所樂自相立者意許無能違害說名為宗如是已顯無過宗相說三相因開示他人是名為他比量此三相中倘有一相未經顯說即似能立雖已顯說而於立者或於敵者若有不成若有猶豫亦似立攝若第一相因與有法相系屬義或則不成或則猶豫如是名為不成似因如有成立聲是無常舉因若言眼所見性兩俱不成如有成立一切樹木皆有心識盡去其皮樹即死亡故此因敵者不成以敵信受識根壽命悉壞滅時是為死相而此死相非樹所有故如數論師成立樂等非是能知因云本無今生故或壞滅無常故此即立者自不成因如是若於因體或因所依起疑惑時亦不成攝譬如有人於霧等性起疑惑時為成大種和合火有而有所說猶豫不成又如說言此山林中定有孔雀聞孔雀鳴聲故彼聲所自來猶有疑惑此即因依猶豫不成有法不成亦不成因譬如成立真我實體遍一切處隨時隨地我德可得故如是若第三相異品無性不成就者是亦名為不定似因如有成立聲常住等因云所量性故此因於同品及於異品或則遍轉或則分轉成不定因如是若於此相有猶豫時亦唯不定如有成立某人定非一切智者或立某人具貪染法因云吐屬言辭故此因異品遠離猶豫不定一切智者吐屬言辭必不可得此不可得本無徵驗成疑因性是故翻此以彼吐屬言辭故因證彼非是一切智者遂成猶豫吐屬言辭與一切智二者之間本不相違故若說言一切智者彼即定不吐屬言辭雖不見其有合屬義其遠離義亦定不成事有疑故事之相違有其二種一者若其因緣具足無闕法則存住異法起時此存住法即歸滅無如是二者名為相違如冷暖觸二者由其法相更互違害不能並存如有與無然此二種相違害義於吐言辭及一切智二者之間皆非有故復次若法非由實相違義證其必無縱不可得不定非有貪等染法吐屬言辭因其果性原不成立此二法中彼一本非此一之因縱彼不有此吐言辭不定隨無如是吐言辭等異品遠離既有猶豫故成不定若有二相有無顛倒名相違因何等為二謂於同品因定有性及於異品因遍無性如所作性或勤勇無間所發性若以常住為其所立此二即成相違似因此二皆於同品遍無異品定有故成顛倒此二能成相違所立故名相違似因更有第三能違意許相違因耶如說眼等必為他用積聚性故如諸床座之支分等此因能成與彼意許非積聚他所受用宗正相違反積聚他所受用宗故成相違何故此論不立彼過耶彼已攝在前二過中故由其能成相違所立不異前二故或則意許或則言陳其為所立都無異故若二相中一相不成餘一猶豫亦名不定譬如成立某人離貪染或有一切智因云吐言辭故此中離義不成合義猶豫有一切智及離貪染法玄祕難知是故此中吐言辭因是有是無猶豫不定若此二相俱有猶豫亦為不定譬如成立生人肉身具有真我有命風故有我無我二品而外更無餘蘊能有命風有我無我此二品類攝一切故此二品類隨一類中因於彼有都不決定極成有我或無我處說有命風俱不成故是故生人肉身所具命風與有我法與無我法其遠離性俱不成就故命風等於此二法無遠離義此中復無相隨逐義任指一法言其有我皆不成故若言有我若言無我其無合義及無離義俱不決定一義之無若決定時能顯餘義決定非有合之與離更互決定為性相故即由此義說合與離既俱猶豫故成不定是故本宗及相違宗二種所立俱不決定如是因三相中若一一相若二二俱或是不成或有猶豫隨其所遇遂有不成相違不定三種似因復有安立相違決定不定因者此論何故不立其過耶比量境中彼非有故如前所說若果比量自性比量及不可得比量三種正因相中此相違決定必不容有三種而外更無其余能具決定名正因者是故安立相違決定能立過者因彼不察實有事相由此力故依自傳承憑藉比量於所億度比量境義說為能立過失諸造論者由迷謬故於境湊泊相違義性此事多有故依前所說安立實事自性果性不可得性三比量者如是相違決定即定不起此中舉例如說若法能於一時與所應合一切別法於一切處悉能結合彼法即定遍一切處譬如虛空許同句義能於一時與所應合一切別法於一切處悉能結合其同句義於彼彼處皆現有性唯由其與彼彼別法相結合時相隨而起若於一處別法非有彼同句義即必不能由其自體充現其處此量乃用自性因式其第二量譬如說言若有一法其可得相雖已具足而於是處彼法自體仍不可得是則彼處其法非有譬如某處實無某瓶今於彼彼別法中間共見隙地汝同句義執可得相雖已具足彼同句義乃不可得此量則為不可得比量因式此量並前自性因式與次前量能成彼此相違宗義故同時對舉遂生猶豫正因三相如前已說僅此已足令義顯了是故二喻初非因外別能立支由此不復別說喻相即於因中喻義已顯故言正因者謂於同品定唯是有復於異品一切遠離如是總說正因共相若差別相復有果比量因自性比量因此二如次以生起不相離性即體不相離性為其所顯能正顯示若有烟處彼處有火火若非有烟亦定無譬如灶中及相違處若有一物是所作性彼物亦必是無常性無常無處所作非有如瓶與空若異此者不能顯因同品有性異品無性及如前說兩種差別謂果比量因果性決定自性比量因由因自體即能遍宗此義既明即喻已顯喻之性相盡於此故即由此故亦即遮遣種種喻過如有成立聲是常住無質礙故如業如極微如瓶三喻如次闕所立法闕能立法所立能立二法俱闕所立法等有猶豫時為過亦爾如立此人具貪染法吐言辭故如街中人此人有死具貪染故如街中人此人非是一切智者具貪染故如街中人無有合義及不說合言者如說若吐言辭彼具貪染如某某人聲是無常所作性故如瓶如是倒合若是無常彼定所作上來諸過由同喻說由異法喻亦復如是如極微如業如空如次即成所立法等諸不遣過其所立法等猶豫不遣過亦如是說譬如成立迦毗羅等非一切智者或不可信從以一切智或可信從為其征相堪為究極正量教法彼所無故此中異喻若是一切智者或可信從者彼必能說星宿等事如哩娑婆嚩䭾曼等此異喻中其所立法非一切智性或非可信從性猶豫不遣能成立法猶豫不遣者譬如說言某甲言辭不為通達三吠陀典婆羅門人之所信受具貪染故此中異喻若其言辭為彼信受見其不具貪等染法如喬達摩等制法論者然於喬達摩等其能立法具貪染等猶豫不遣俱猶豫不遣者譬如成立迦毗羅等未離貪染有取著慳吝故此中異喻謂若離染彼無取著慳吝如哩娑婆等然哩娑婆等其不離染及有取著慳吝如此能立所立二法遠離與否俱有猶豫無離義者譬如成立不離貪染吐言辭故異喻若云若離貪染彼無言說如彼塊石縱彼塊石雙離二法然不能成凡離染處皆無言說遍遮遣性故無離義不說離者譬如成立聲是無常所作性故如空倒離者謂如說言若非所作見彼是常此等似喻不能決定顯因共相謂因唯於同品有性於異品中決定遍無復不能顯因差別相義准當衣說正因相即已遮遣諸似喻過言能破者謂正宣說闕減性等闕減性等能立過失如前已說若正顯示彼過失名為能破謂由此語能遮敵者所樂宗義使不得成故言似破者謂諸過類於無過處橫說其失此中多兮名為過類為他比量品第三終
